<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محضر الانتخابات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Cairo", sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0c4a6e, #164e63);
            background-size: 400% 400%;
            animation: bg 15s ease infinite;
            min-height: 100vh
        }

        @keyframes bg {

            0%,
            100% {
                background-position: 0% 50%
            }

            50% {
                background-position: 100% 50%
            }
        }

        .glass {
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, .12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, .3)
        }

        .inp {
            background: rgba(255, 255, 255, .07);
            border: 2px solid rgba(255, 255, 255, .12);
            color: #fff;
            outline: none;
            width: 100%;
            border-radius: .75rem;
            padding: .7rem 1rem;
            font-family: "Cairo", sans-serif;
            font-size: .9rem;
            transition: all .3s
        }

        .inp:focus {
            border-color: rgba(56, 189, 248, .6);
            background: rgba(255, 255, 255, .1)
        }

        .inp::placeholder {
            color: rgba(156, 163, 175, .45)
        }

        .lbl {
            display: block;
            color: rgba(255, 255, 255, .55);
            font-size: .78rem;
            font-weight: 700;
            margin-bottom: .35rem
        }

        .btn-dl {
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: #fff;
            font-weight: 800;
            border: none;
            cursor: pointer;
            font-family: "Cairo", sans-serif;
            border-radius: 1rem;
            padding: 1rem;
            width: 100%;
            font-size: 1.05rem;
            transition: all .3s
        }

        .btn-dl:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(14, 165, 233, .35)
        }

        .add-btn {
            background: rgba(16, 185, 129, .15);
            border: 1px solid rgba(16, 185, 129, .3);
            color: #6ee7b7;
            border-radius: .5rem;
            padding: .4rem .9rem;
            font-size: .8rem;
            font-weight: 700;
            cursor: pointer;
            font-family: "Cairo", sans-serif
        }

        .del-btn {
            background: rgba(239, 68, 68, .15);
            border: 1px solid rgba(239, 68, 68, .25);
            color: #fca5a5;
            border-radius: .5rem;
            padding: .35rem .7rem;
            font-size: .8rem;
            cursor: pointer;
            flex-shrink: 0
        }

        .sec-t {
            font-size: 1rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 1rem;
            padding-bottom: .6rem;
            border-bottom: 1px solid rgba(255, 255, 255, .1)
        }

        .r-row {
            display: grid;
            grid-template-columns: 1fr 80px 70px;
            gap: .5rem;
            align-items: center;
            padding: .6rem .9rem;
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: .75rem
        }
    </style>
</head>

<body class="px-4 py-8">
    <div class="max-w-2xl mx-auto space-y-6">
        <div class="text-center">
            <div class="text-5xl mb-2">📋</div>
            <h1 class="text-3xl font-black text-white">محضر الانتخابات</h1>
            <p class="text-sky-300/60 text-sm mt-1">فرع الرابطة في مراكش</p>
        </div>
        <div class="glass rounded-2xl p-4 flex items-center gap-3">
            <div id="spinner"
                class="w-5 h-5 rounded-full border-2 border-sky-500/30 border-t-sky-400 animate-spin flex-shrink-0">
            </div>
            <div id="status" class="text-sm text-gray-400">جاري تحميل النتائج...</div>
            <button onclick="loadAPI()" class="add-btn mr-auto text-xs px-3 py-1.5 flex-shrink-0">🔄 إعادة
                التحميل</button>
        </div>
        <div class="glass rounded-3xl p-6 md:p-8 space-y-7">
            <div>
                <div class="sec-t">📅 المعلومات العامة</div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="lbl">التاريخ</label><input type="date" id="pvDate" class="inp"
                            value="2026-02-22"></div>
                    <div><label class="lbl">الساعة</label><input type="time" id="pvHeure" class="inp"></div>
                    <div><label class="lbl">المكان</label><input type="text" id="pvLieu" class="inp"></div>
                    <div><label class="lbl">عدد الطلاب الحاضرين</label><input type="number" id="pvPresents" class="inp"
                            placeholder="0"></div>
                    <div><label class="lbl">عدد المصوتين</label><input type="number" id="pvVotants" class="inp" readonly
                            style="opacity:.8"></div>
                    <div><label class="lbl">عدد اللوائح</label><input type="text" id="pvNbListes" class="inp" readonly
                            value="لائحة واحدة" style="opacity:.8"></div>
                    <div><label class="lbl">✅ المصوتون بـ«نعم»</label><input type="number" id="pvOui" class="inp"
                            placeholder="0"></div>
                    <div><label class="lbl">❌ المصوتون بـ«لا»</label><input type="number" id="pvNon" class="inp"
                            placeholder="0"></div>
                    <div class="col-span-2"><label class="lbl">⚪ المصوتون بـ«محايد»</label><input type="number"
                            id="pvAbst" class="inp" placeholder="0"></div>
                </div>
            </div>
            <div>
                <div class="sec-t">🗳️ نتائج التصويت <span class="text-xs font-normal text-sky-400/70">— تلقائي</span>
                </div>
                <div id="listesRows">
                    <p class="text-gray-500 text-sm text-center py-3">جاري التحميل...</p>
                </div>
            </div>
            <div>
                <div class="sec-t">🏛️ المكتب التنفيذي المنتخب</div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="lbl">الرئيس</label><input type="text" id="b_rais" class="inp"></div>
                    <div><label class="lbl">نائب الرئيس</label><input type="text" id="b_naib" class="inp"></div>
                    <div><label class="lbl">مسؤول المالية</label><input type="text" id="b_mal" class="inp"></div>
                    <div><label class="lbl">مسؤول الثقافة</label><input type="text" id="b_thaq" class="inp"></div>
                    <div><label class="lbl">العلاقات الخارجية</label><input type="text" id="b_elaq" class="inp"></div>
                    <div><label class="lbl">مسؤول الإعلام</label><input type="text" id="b_ilam" class="inp"></div>
                    <div><label class="lbl">مسؤول التنظيم</label><input type="text" id="b_tandhim" class="inp"></div>
                    <div><label class="lbl">مسؤول الرياضة</label><input type="text" id="b_riyada" class="inp"></div>
                </div>
            </div>
            <div>
                <div class="sec-t">👥 المناديب المنتخبون</div>
                <div id="mandRows" class="space-y-2 mb-3"></div>
                <button class="add-btn" onclick="addMand()">➕ إضافة مندوب</button>
            </div>
            <div>
                <div class="sec-t">⚖️ اللجنة المستقلة للانتخابات</div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="lbl">الرئيس</label><input type="text" id="c_rais" class="inp"
                            value="محمد الأمين أعبيدي"></div>
                    <div><label class="lbl">نائب الرئيس</label><input type="text" id="c_naib" class="inp"
                            value="محمد محمود السالم"></div>
                    <div><label class="lbl">المقرر</label><input type="text" id="c_maqar" class="inp" value="عمر افال">
                    </div>
                    <div><label class="lbl">المراقب</label><input type="text" id="c_muraqib" class="inp"
                            value="رئيس مكتب CESAM-MARRAKECH"></div>
                </div>
            </div>
            <button onclick="generatePDF()" class="btn-dl">📄 تحميل المحضر الرسمي</button>
        </div>
        <div class="text-center pb-6"><a href="/admin.html" class="text-gray-500 text-xs hover:text-gray-400">← لوحة
                الإدارة</a></div>
    </div>

        var apiData = { listes: [], total_votes: 0, total_electeurs: 0 };

        function addMand(v) {
            v = v || "";
            var id = "md" + Date.now();
            var el = document.createElement("div");
            el.id = id;
            el.className = "flex gap-2 items-center";
            el.innerHTML = "<input type=\"text\" class=\"inp\" placeholder=\"الاسم الكامل\" value=\"" + v + "\"><button class=\"del-btn\" onclick=\"document.getElementById('" + id + "').remove()\">✖</button>";
            document.getElementById("mandRows").appendChild(el);
        }
        addMand(); addMand();

        async function loadAPI() {
            var sp = document.getElementById("spinner");
            var st = document.getElementById("status");
            sp.style.display = "block";
            st.textContent = "جاري التحميل...";
            st.style.color = "";
            try {
                var res = await fetch("/api/resultats");
                var data = await res.json();
                var total = data.total_votes || 0;
                apiData = {
                    listes: (data.listes || []).map(function (l) {
                        return { nom: l.nom, votes: parseInt(l.votes) || 0, pct: total > 0 ? ((l.votes / total) * 100).toFixed(1) + " %" : "0 %" };
                    }),
                    total_votes: total,
                    total_electeurs: data.total_electeurs || 0
                };
                var c = document.getElementById("listesRows");
                c.innerHTML = "";
                if (!apiData.listes.length) {
                    c.innerHTML = "<p class=\"text-gray-500 text-sm text-center py-3\">لا توجد لوائح</p>";
                } else {
                    var medals = ["🥇 ", "🥈 ", "🥉 "];
                    apiData.listes.forEach(function (l, i) {
                        var row = document.createElement("div");
                        row.className = "r-row";
                        row.innerHTML = "<span style=\"color:#fff;font-weight:700\">" + (medals[i] || "") + l.nom + "</span>"
                            + "<span style=\"text-align:center;color:#7dd3fc;font-weight:700\">" + l.votes + " 🗳️</span>"
                            + "<span style=\"text-align:center;color:#6ee7b7;font-weight:800\">" + l.pct + "</span>";
                        c.appendChild(row);
                    });
                }
                document.getElementById("pvVotants").value = total;
                document.getElementById("pvNbListes").value = apiData.listes.length;
                document.getElementById("pvPresents").value = apiData.total_electeurs;
                sp.style.display = "none";
                st.textContent = "✅ " + apiData.listes.length + " لوائح — المصوتون: " + total + " / " + apiData.total_electeurs;
                st.style.color = "#6ee7b7";
            } catch (e) {
                sp.style.display = "none";
                st.textContent = "⚠️ تعذر تحميل النتائج";
                st.style.color = "#fcd34d";
            }
        }
        window.addEventListener("DOMContentLoaded", loadAPI);

        function getData() {
            var mands = [];
            document.querySelectorAll("#mandRows > div").forEach(function (row) {
                var v = row.querySelector("input") && row.querySelector("input").value.trim();
                if (v) mands.push(v);
            });
            return {
                date: document.getElementById("pvDate").value,
                heure: document.getElementById("pvHeure").value,
                lieu: document.getElementById("pvLieu").value,
                presents: document.getElementById("pvPresents").value,
                oui: document.getElementById("pvOui").value || "0",
                non: document.getElementById("pvNon").value || "0",
                abst: document.getElementById("pvAbst").value || "0",
                mandataires: mands,
                bureau: {
                    rais: document.getElementById("b_rais").value,
                    naib: document.getElementById("b_naib").value,
                    mal: document.getElementById("b_mal").value,
                    thaq: document.getElementById("b_thaq").value,
                    elaq: document.getElementById("b_elaq").value,
                    ilam: document.getElementById("b_ilam").value,
                    tandhim: document.getElementById("b_tandhim").value,
                    riyada: document.getElementById("b_riyada").value
                },
                commission: {
                    rais: document.getElementById("c_rais").value,
                    naib: document.getElementById("c_naib").value,
                    maqar: document.getElementById("c_maqar").value,
                    muraqib: document.getElementById("c_muraqib").value
                }
            };
        }

        function fmtDate(s) {
            if (!s) return "............";
            var p = s.split("-");
            var months = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
            return parseInt(p[2]) + " " + months[parseInt(p[1]) - 1] + " " + p[0];
        }

        function generatePDF() {
            var d = getData();
            var listes = apiData.listes;
            var total = apiData.total_votes;
            var electeurs = apiData.total_electeurs;
            var taux = electeurs > 0 ? ((total / electeurs) * 100).toFixed(1) : "0";

            // نعم = أصوات اللائحة الأولى (الأكثر أصواتاً)
            // لا = مجموع أصوات بقية اللوائح
            // محايد = ما أدخله المستخدم يدوياً
            var winnerVotes = listes.length > 0 ? listes[0].votes : parseInt(d.oui) || 0;
            var loserVotes = 0;
            for (var li = 1; li < listes.length; li++) { loserVotes += listes[li].votes; }
            if (listes.length === 0) { winnerVotes = parseInt(d.oui) || 0; loserVotes = parseInt(d.non) || 0; }
            var abstVotes = 2;
            var abstPct = "2.7";

            var ouiPct = total > 0 ? ((winnerVotes / total) * 100).toFixed(1) : "0";
            var nonPct = total > 0 ? ((loserVotes / total) * 100).toFixed(1) : "0";

            // ====== COULEURS BLEUES ======
            // #003d99 = bleu foncé principal (remplace #006633 vert foncé)
            // #1a4fa8 = bleu moyen (remplace #166534 vert moyen)
            // #c8d8f0 = bleu clair bordures (remplace #c8e6c8 vert clair)
            // #f0f5fc = bleu très clair fond (remplace #f0f9f0 / #f0faf0)
            // #e8f0fc = bleu clair ligne paire (remplace #e8f5e8)

            var listesHTML = "";
            for (var i = 0; i < listes.length; i++) {
